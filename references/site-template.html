<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} · 产物站点</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%233B82F6'/%3E%3Ctext x='16' y='22' font-family='-apple-system,sans-serif' font-size='18' font-weight='700' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
<style>
  :root {
    --ink:    #0F172A;
    --ink2:   #334155;
    --ink3:   #64748B;
    --ink4:   #94A3B8;
    --line:   #E2E8F0;
    --line2:  #CBD5E1;
    --bg:     #F8FAFC;
    --panel:  #FFFFFF;
    --accent: #3B82F6;
    --accentH:#2563EB;
    --code:   #F1F5F9;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; font-size: 15px; line-height: 1.65; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accentH); text-decoration: underline; }
  button { font: inherit; cursor: pointer; }
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* ===== 顶部 ===== */
  header.app-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--panel); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px; height: 56px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 15px; color: var(--ink); flex-shrink: 0;
  }
  .brand .logo {
    width: 28px; height: 28px; border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), #8B5CF6);
    color: white; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .brand .divider { color: var(--ink4); font-weight: 400; }
  .brand .subtitle { color: var(--ink3); font-weight: 400; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  nav.tabs {
    display: flex; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: thin;
    height: 100%; align-items: stretch;
  }
  nav.tabs::-webkit-scrollbar { height: 4px; }
  nav.tabs::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }
  nav.tabs a {
    display: flex; align-items: center; gap: 6px;
    padding: 0 14px; font-size: 13.5px; color: var(--ink2);
    border-bottom: 2px solid transparent; transition: all 120ms ease;
    white-space: nowrap; text-decoration: none;
  }
  nav.tabs a:hover { color: var(--ink); background: var(--bg); }
  nav.tabs a.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  nav.tabs a .type-pill {
    font-size: 10px; padding: 1px 6px; border-radius: 9999px;
    background: var(--code); color: var(--ink3); font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  nav.tabs a.active .type-pill { background: rgba(59,130,246,0.12); color: var(--accent); }
  nav.tabs a.is-prototype .type-pill { background: rgba(139,92,246,0.12); color: #7C3AED; }

  /* ===== 主体 ===== */
  main { display: grid; grid-template-columns: 248px 1fr; min-height: calc(100vh - 56px); }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } aside.toc { display: none; } }

  aside.toc {
    border-right: 1px solid var(--line); background: var(--panel);
    padding: 24px 20px; overflow-y: auto; max-height: calc(100vh - 56px);
    position: sticky; top: 56px;
  }
  aside.toc.is-hidden { display: none; }
  aside.toc .toc-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--ink4); font-weight: 600; margin-bottom: 12px;
  }
  aside.toc ul { list-style: none; margin: 0; padding: 0; font-size: 13.5px; }
  aside.toc li a {
    display: block; padding: 4px 8px; color: var(--ink2); border-radius: 4px;
    line-height: 1.45;
  }
  aside.toc li a:hover { background: var(--bg); text-decoration: none; color: var(--ink); }
  aside.toc li a.active { color: var(--accent); background: rgba(59,130,246,0.08); font-weight: 500; }
  aside.toc li.h3 a { padding-left: 20px; font-size: 12.5px; color: var(--ink3); }
  aside.toc .empty { color: var(--ink4); font-size: 12px; }

  /* ===== 内容区 ===== */
  section.content { padding: 36px 56px; max-width: 920px; width: 100%; }
  section.content.is-prototype { padding: 0; max-width: none; }
  section.content article { color: var(--ink); }
  iframe.proto {
    width: 100%; height: calc(100vh - 56px); border: 0; display: block;
  }

  /* ===== md 排版 ===== */
  article h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; }
  article h2 { font-size: 22px; font-weight: 600; margin: 36px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
  article h3 { font-size: 17px; font-weight: 600; margin: 28px 0 10px; }
  article h4 { font-size: 14.5px; font-weight: 600; margin: 22px 0 8px; color: var(--ink2); }
  article p { margin: 12px 0; }
  article > blockquote {
    margin: 16px 0; padding: 10px 16px; border-left: 3px solid var(--accent);
    background: rgba(59,130,246,0.05); color: var(--ink2); border-radius: 0 6px 6px 0;
  }
  article > blockquote p { margin: 4px 0; }
  article code {
    background: var(--code); padding: 2px 6px; border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.88em;
  }
  article pre {
    background: var(--code); padding: 14px 18px; border-radius: 8px;
    overflow-x: auto; margin: 16px 0; font-size: 13px; line-height: 1.55;
  }
  article pre code { background: transparent; padding: 0; font-size: inherit; }
  article ul, article ol { padding-left: 24px; margin: 12px 0; }
  article li { margin: 4px 0; }
  article li > input[type=checkbox] { margin-right: 6px; }
  article table {
    border-collapse: collapse; margin: 16px 0; font-size: 14px;
    width: auto; min-width: 50%;
  }
  article th, article td {
    border: 1px solid var(--line); padding: 8px 12px; text-align: left;
    vertical-align: top;
  }
  article th { background: var(--bg); font-weight: 600; }
  article tr:nth-child(2n) td { background: rgba(248,250,252,0.4); }
  article hr { border: 0; border-top: 1px solid var(--line); margin: 28px 0; }
  article img { max-width: 100%; border-radius: 6px; }
  article .mermaid {
    background: var(--panel); padding: 16px; border: 1px solid var(--line);
    border-radius: 8px; margin: 16px 0; text-align: center; overflow-x: auto;
  }
  article h2 a.anchor, article h3 a.anchor {
    color: var(--ink4); opacity: 0; text-decoration: none; margin-left: 6px; font-weight: 400;
  }
  article h2:hover a.anchor, article h3:hover a.anchor { opacity: 1; }

  /* 滚动锚定平滑 */
  html { scroll-behavior: smooth; scroll-padding-top: 72px; }

  /* 状态条 */
  footer.statusbar {
    position: fixed; right: 16px; bottom: 12px; z-index: 40;
    background: var(--ink); color: white; font-size: 11px;
    padding: 4px 10px; border-radius: 9999px; opacity: 0.7;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    pointer-events: none;
  }

  /* 空态 */
  .empty-state { text-align: center; color: var(--ink3); padding: 80px 20px; }
  .empty-state h2 { color: var(--ink2); }
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <span class="logo">P</span>
    <span>{{TITLE}}</span>
    <span class="divider">/</span>
    <span class="subtitle" id="current-doc">—</span>
  </div>
  <nav class="tabs" id="tabs" aria-label="文档导航"></nav>
</header>

<main>
  <aside class="toc" id="toc" aria-label="目录">
    <div class="toc-title">目录</div>
    <ul id="toc-list"><li class="empty">无目录</li></ul>
  </aside>
  <section class="content" id="content">
    <div class="empty-state">
      <h2>正在加载...</h2>
    </div>
  </section>
</main>

<footer class="statusbar" id="statusbar"></footer>

<script id="payload" type="application/json">{{PAYLOAD_JSON}}</script>

<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.esm.min.mjs';
  window.mermaid = mermaid;
  mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
</script>

<script>
(function() {
  /* ===== 解析 payload ===== */
  const raw = document.getElementById('payload').textContent;
  const payload = JSON.parse(raw);
  const items = payload.navItems || [];
  const docTitle = payload.title || 'Untitled';
  document.title = docTitle + ' · 产物站点';

  /* ===== marked 配置 ===== */
  marked.use({
    gfm: true,
    breaks: false,
    mangle: false,
    headerIds: true,
    headerPrefix: 'h-',
  });

  // 把 ```mermaid ... ``` 代码块转成 .mermaid div
  // 兼容 marked v4–v12+ 的 renderer.code 签名：旧版 (code, lang, escaped)，v12+ ({text, lang, escaped})
  const renderer = new marked.Renderer();
  const oldCode = renderer.code.bind(renderer);
  renderer.code = function(codeOrObj, lang) {
    const isObj = typeof codeOrObj === 'object' && codeOrObj !== null;
    const text = isObj ? codeOrObj.text : codeOrObj;
    const language = isObj ? codeOrObj.lang : lang;
    if (language === 'mermaid') {
      const esc = String(text).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      return `<div class="mermaid">${esc}</div>`;
    }
    return isObj ? oldCode.call(this, codeOrObj) : oldCode.call(this, codeOrObj, lang);
  };
  marked.use({ renderer });

  /* ===== 渲染导航 ===== */
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = items.map(it => `
    <a href="#${it.id}" data-id="${it.id}" class="${it.type === 'html' ? 'is-prototype' : ''}">
      <span>${escapeHtml(it.label)}</span>
      <span class="type-pill">${it.type === 'html' ? '原型' : 'md'}</span>
    </a>`).join('');

  /* ===== 切换标签 ===== */
  const content = document.getElementById('content');
  const toc = document.getElementById('toc');
  const tocList = document.getElementById('toc-list');
  const currentDoc = document.getElementById('current-doc');
  const statusbar = document.getElementById('statusbar');

  function go(id, push = true) {
    const it = items.find(x => x.id === id) || items[0];
    if (!it) {
      content.innerHTML = '<div class="empty-state"><h2>没有可显示的内容</h2><p>未在目录中找到 md 文件或 prototype.html</p></div>';
      statusbar.textContent = '0 sections';
      return;
    }
    currentDoc.textContent = it.label;
    // 更新 active tab
    tabs.querySelectorAll('a').forEach(a => a.classList.toggle('active', a.dataset.id === it.id));

    if (it.type === 'html') {
      toc.classList.add('is-hidden');
      content.classList.add('is-prototype');
      content.innerHTML = '';
      const ifr = document.createElement('iframe');
      ifr.className = 'proto';
      ifr.setAttribute('title', it.label);
      ifr.setAttribute('sandbox', 'allow-scripts allow-forms allow-popups allow-modals');
      ifr.srcdoc = it.content;
      content.appendChild(ifr);
      tocList.innerHTML = '<li class="empty">原型视图</li>';
      statusbar.textContent = `prototype · ${Math.round(it.content.length / 1024)} KB`;
    } else {
      toc.classList.remove('is-hidden');
      content.classList.remove('is-prototype');
      const html = marked.parse(it.content);
      content.innerHTML = `<article>${html}</article>`;
      // 渲染 mermaid（如有）— 等 ESM module 就绪
      const mermaidEls = content.querySelectorAll('.mermaid');
      if (mermaidEls.length > 0) {
        const tryMermaid = (attempt = 0) => {
          if (window.mermaid) {
            window.mermaid.run({ nodes: mermaidEls }).catch(e => console.warn('mermaid render:', e));
          } else if (attempt < 20) {
            setTimeout(() => tryMermaid(attempt + 1), 100);
          } else {
            console.warn('mermaid module did not load within 2s');
          }
        };
        tryMermaid();
      }
      // 重建 ToC
      buildToc();
      // 高亮代码
      content.querySelectorAll('pre code').forEach(b => { try { hljs.highlightElement(b); } catch (e) {} });
      // 字数统计
      const words = it.content.length;
      statusbar.textContent = `${it._path || it.id} · ${words.toLocaleString()} chars`;
    }
    if (push) {
      history.replaceState(null, '', '#' + it.id);
    }
    window.scrollTo({ top: 0 });
  }

  let _autoIdSeq = 0;
  function buildToc() {
    const headings = content.querySelectorAll('article h2, article h3');
    if (headings.length === 0) {
      tocList.innerHTML = '<li class="empty">无章节</li>';
      return;
    }
    tocList.innerHTML = Array.from(headings).map(h => {
      const id = h.id || ('h-auto-' + (++_autoIdSeq));
      h.id = id;
      const level = h.tagName === 'H3' ? 'h3' : 'h2';
      return `<li class="${level}"><a href="#${encodeURIComponent(id)}">${escapeHtml(h.textContent)}</a></li>`;
    }).join('');
    // ToC 高亮跟随滚动
    setupScrollSpy(headings);
  }

  let scrollSpyHandler = null;
  function setupScrollSpy(headings) {
    if (scrollSpyHandler) window.removeEventListener('scroll', scrollSpyHandler);
    const links = Array.from(tocList.querySelectorAll('a'));
    scrollSpyHandler = () => {
      const y = window.scrollY + 100;
      let activeIdx = 0;
      headings.forEach((h, i) => { if (h.offsetTop <= y) activeIdx = i; });
      links.forEach((a, i) => a.classList.toggle('active', i === activeIdx));
    };
    window.addEventListener('scroll', scrollSpyHandler, { passive: true });
    scrollSpyHandler();
  }

  /* ===== 路由 ===== */
  function fromHash() {
    const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
    // 1) 优先匹配 nav id
    if (hash && items.find(x => x.id === hash)) return hash;
    // 2) hash 可能是文档内锚点（h-xxx），保留当前页
    return items[0]?.id;
  }

  // 拦截 nav 点击 + 监听 hashchange
  tabs.addEventListener('click', e => {
    const a = e.target.closest('a[data-id]');
    if (!a) return;
    e.preventDefault();
    go(a.dataset.id);
  });
  window.addEventListener('hashchange', () => {
    const id = fromHash();
    if (id && (!items.find(x => x.id === id) || tabs.querySelector('a.active')?.dataset.id !== id)) {
      go(id, false);
    }
  });

  /* ===== 启动 ===== */
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  go(fromHash(), false);
})();
</script>
</body>
</html>
